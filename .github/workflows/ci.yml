name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Server: TypeScript compile ───────────────────────────────────────────────
  server:
    name: Server build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type-check & compile
        run: npm run build

  # ── Client — Main app ────────────────────────────────────────────────────────
  client-main:
    name: Client (main) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/main
    env:
      NEXT_PUBLIC_API_URL: https://so-blik.onrender.com/api
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_MOCK_API: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Client — CMS ─────────────────────────────────────────────────────────────
  client-cms:
    name: Client (CMS) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/cms
    env:
      NEXT_PUBLIC_API_URL: https://so-blik.onrender.com/api
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_MOCK_API: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
